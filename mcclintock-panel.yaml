# ═══════════════════════════════════════════════════
# McClintock Panel — Complete ESPHome Config
#
# Drives all 3 gauges from a vintage O.B. McClintock
# bank vault alarm panel using a single ESP32.
#
# Based on actual terminal measurements:
#   Milliamp meter:    ~4mA full scale (DAC + 820Ω)
#   4-terminal gauge:  3kΩ coil (DAC direct, no resistor)
#   5-terminal gauge:  36Ω coil (DRV8871 H-bridge)
# ═══════════════════════════════════════════════════

esphome:
  name: mcclintock-panel
  friendly_name: McClintock Panel
  on_boot:
    priority: -100
    then:
      # ── Boot sweep: self-test all three gauges ──
      # Zero everything
      - output.set_level: { id: milli_dac, level: 0.0 }
      - output.set_level: { id: gauge4_dac, level: 0.0 }
      - output.set_level: { id: gauge5_in1, level: 0.0 }
      - output.set_level: { id: gauge5_in2, level: 0.0 }
      - delay: 500ms
      # Sweep up / right
      - output.set_level: { id: milli_dac, level: 1.0 }
      - output.set_level: { id: gauge4_dac, level: 1.0 }
      - output.set_level: { id: gauge5_in1, level: 1.0 }
      - delay: 600ms
      # Sweep down / left (5-terminal only)
      - output.set_level: { id: gauge5_in1, level: 0.0 }
      - output.set_level: { id: gauge5_in2, level: 1.0 }
      - delay: 600ms
      # Return to rest
      - output.set_level: { id: milli_dac, level: 0.0 }
      - output.set_level: { id: gauge4_dac, level: 0.0 }
      - output.set_level: { id: gauge5_in2, level: 0.0 }
      - delay: 300ms

esp32:
  board: esp32dev
  framework:
    type: arduino

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "McClintock Fallback"
    password: !secret fallback_password

captive_portal:

logger:

# ═══════════════════════════════════════════════════
# OUTPUTS
# ═══════════════════════════════════════════════════

output:

  # ── Milliamp Meter: DAC + 820Ω resistor ──
  # GPIO25 → 820Ω → Meter + → Meter − → GND
  # 3.3V / 820Ω ≈ 4mA full scale
  - platform: esp32_dac
    id: milli_dac
    pin: GPIO25
    max_power: 1.0

  # ── 4-Terminal Gauge (3kΩ): DAC direct, no resistor ──
  # GPIO26 → Coil + → Coil − → GND
  # 3.3V / 3kΩ ≈ 1.1mA (well within DAC limits)
  - platform: esp32_dac
    id: gauge4_dac
    pin: GPIO26
    max_power: 1.0

  # ── 5-Terminal Gauge (36Ω): DRV8871 H-bridge ──
  # GPIO16 → DRV8871 IN1 → OUT1 → Gauge + terminal
  # GPIO17 → DRV8871 IN2 → OUT2 → Gauge − terminal
  # 3.3V → DRV8871 VM, GND → DRV8871 GND
  - platform: ledc
    id: gauge5_in1
    pin: GPIO16
    frequency: 1000 Hz
    max_power: 0.10  # START LOW — increase during calibration

  - platform: ledc
    id: gauge5_in2
    pin: GPIO17
    frequency: 1000 Hz
    max_power: 0.10  # START LOW — increase during calibration

# ═══════════════════════════════════════════════════
# HOME ASSISTANT CONTROLS
# ═══════════════════════════════════════════════════

number:

  # ── Milliamp Meter: 0 to 100% ──
  - platform: template
    name: "Milliamp Gauge"
    id: milli_value
    icon: "mdi:gauge"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    unit_of_measurement: "%"
    optimistic: true
    set_action:
      - output.set_level:
          id: milli_dac
          level: !lambda "return x / 100.0;"

  # ── 4-Terminal Gauge: 0 to 100% ──
  # Unidirectional — 0V = rest, 3.3V = full deflection
  - platform: template
    name: "4-Terminal Gauge"
    id: gauge4_value
    icon: "mdi:gauge"
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 0
    unit_of_measurement: "%"
    optimistic: true
    set_action:
      - output.set_level:
          id: gauge4_dac
          level: !lambda "return x / 100.0;"

  # ── 5-Terminal Gauge: -100 to +100 (bidirectional) ──
  # Negative = one direction, 0 = rest, Positive = other
  - platform: template
    name: "5-Terminal Gauge"
    id: gauge5_value
    icon: "mdi:gauge"
    min_value: -100
    max_value: 100
    step: 1
    initial_value: 0
    optimistic: true
    set_action:
      - lambda: |-
          if (x >= 0) {
            id(gauge5_in1).set_level(x / 100.0);
            id(gauge5_in2).set_level(0.0);
          } else {
            id(gauge5_in1).set_level(0.0);
            id(gauge5_in2).set_level(-x / 100.0);
          }

